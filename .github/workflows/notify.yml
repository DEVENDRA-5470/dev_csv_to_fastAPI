name: Telegram Notify
on: [push]
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Message
        run: |
          REPO_LINK="https://github.com/${{ github.repository }}"
          TEXT="NEW PUSH%0A"
          TEXT="${TEXT}Repo   : ${{ github.repository }}%0A"
          TEXT="${TEXT}Link   : https://github.com/${{ github.repository }}%0A"
          TEXT="${TEXT}Branch : ${{ github.ref_name }}%0A"
          TEXT="${TEXT}By     : ${{ github.actor }}%0A"
          TEXT="${TEXT}Commit : ${{ github.event.commits[0].message }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${TEXT}"
